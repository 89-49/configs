server:
  port: 8090

spring:
  application:
    name: gateway-server
  cloud:
    config:
      enabled: false
    gateway:
      server:
        webmvc:
          routes:
            - id: trace-server
              uri: lb://trace-server
              predicates:
                - Path=/api/v1/trace/**
            
            - id: user-service-auth
              uri: lb://user-service
              predicates:
                - Path=/api/v1/auth/**

            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/v1/users/**

            - id: product-service
              uri: lb://product-service
              predicates:
                - Path=/api/v1/products/**

            - id: trade-service
              uri: lb://trade-service
              predicates:
                - Path=/api/v1/trades/**

            - id: reservation-service
              uri: lb://reservation-service
              predicates:
                - Path=/api/v1/reservations/**

            - id: chat-service
              uri: lb://chat-service
              predicates:
                - Path=/api/v1/chat/**

eureka:
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
