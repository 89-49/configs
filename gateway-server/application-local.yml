server:
  port: 8090

spring:
  application:
    name: gateway-server
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: trace-server
              # 일단 이 부분은 임시로 이렇게 설정했습니다.
              uri: http://localhost:28099
              predicates:
                - Path=/api/v1/trace/**
            
            - id: user-service-auth
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/auth/**

            - id: user-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/users/**

            - id: product-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/products/**

            - id: trade-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/v1/trades/**

            - id: reservation-service
              uri: http://localhost:8085
              predicates:
                - Path=/api/v1/reservations/**

            - id: chat-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/v1/chat/**

eureka:
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:13101/eureka/

jwt:
  secret: ${JWT_SECRET}           # 기본값 없음 — 반드시 환경변수로 주입(user-service와 동일한 값 사용)
  access-token-expiration: ${JWT_ACCESS_EXPIRATION:1800000}   # 30분 (ms)
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800000} # 7일 (ms)
