server:
  port: 8082

spring:
  application:
    name: product-service

management:
  endpoints:
    web:
      exposure:
        include: refresh,health,info,metrics,prometheus,env
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
  tracing:
    sampling:
      probability: 1.0
