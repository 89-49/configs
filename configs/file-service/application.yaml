server:
  port: 8089

spring:
  threads:
    virtual:
      enabled: true
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_URL:localhost:5432/postgres}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        use_sql_comments: true
    hibernate:
      ddl-auto: ${DB_DDL_AUTO:update}
    open-in-view: false
    generate-ddl: true

  servlet:
    multipart:
      max-file-size: 10MB # 파일 1개당 최대 사이즈
      max-request-size: 50MB # 전체 업로드 파일 최대 사이즈
      file-size-threshold: 20MB

# 로그 설정
logging:
  level:
    org.hibernate.type: trace
    org.hibernate.orm.jdbc.bind: trace


# 파일 설정
file:
  storage:
    type: local # local, s3, gcs
    endpoint: ${STORAGE_ENDPOINT}

  local:
    base:
      path: ${FILE_BASE_PATH:./storage/files}
      url: ${FILE_BASE_URL:/upload/}
  s3:
    bucket: ${AWS_S3_BUCKET}
    region: ${AWS_S3_REGION}
    access-key: ${AWS_ACCESS_KEY_ID}
    secret-key: ${AWS_SECRET_ACCESS_KEY}
  gcs:
    bucket: ${GCS_BUCKET}
    project-id: ${GCS_PROJECT_ID}
    key--path: ${GCS_KEY_PATH}