server:
  port: 8090

spring:
  application:
    name: gateway-server
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: trace-server
              uri: lb://trace-server
              predicates:
                - Path=/api/v1/trace/**
            
            - id: user-service-auth
              uri: lb://user-service
              predicates:
                - Path=/api/v1/auth/**

            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/v1/users/**

            - id: product-service
              uri: lb://product-service
              predicates:
                - Path=/api/v1/products/**

            - id: trade-service
              uri: lb://trade-service
              predicates:
                - Path=/api/v1/trades/**

            - id: reservation-service
              uri: lb://reservation-service
              predicates:
                - Path=/api/v1/reservations/**

            - id: chat-service
              uri: lb://chat-service
              predicates:
                - Path=/api/v1/chat/**

info:
  app:
    name: gateway
    hostname: ${HOSTNAME:localhost}

eureka:
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://eureka-server:8761/eureka/}

jwt:
  secret: ${JWT_SECRET}           # 기본값 없음 — 반드시 환경변수로 주입(user-service와 동일한 값 사용)
  access-token-expiration: ${JWT_ACCESS_EXPIRATION:1800000}   # 30분 (ms)
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800000} # 7일 (ms)

# 게이트웨이에서의 로그 파일의 저장 경로 & 로그 파일 관리 규칙 지정(로컬에서는 미사용)
logging:
  file:
    name: ${LOG_FILE_PATH:}
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7
