server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: user-service
    
  main:
    allow-bean-definition-overriding: true
    
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/userdb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    show_sql: ${SPRING_JPA_SHOW_SQL:false}
    # JPA가 준비된 이후 src/main/resources/data.sql 파일의 MASTER 등록 쿼리 실행
    defer-datasource-initialization: true
    
  sql:
    init:
      mode: always

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

jwt:
  secret: ${JWT_SECRET}           # 기본값 없음 — 반드시 환경변수로 주입
  access-token-expiration: ${JWT_ACCESS_EXPIRATION:1800000}   # 30분 (ms)
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800000} # 7일 (ms)
