server:
  port: 8084

spring:
  application:
    name: chat-service

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_URL:chat-db:5432/chat_db}
    username: ${DB_USERNAME:pgsg-user}
    password: ${DB_PASSWORD:pgsg-password-1234}

  jpa:
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        use_sql_comments: true
    hibernate:
      ddl-auto: ${DB_DDL_AUTO:update}
    open-in-view: false
    generate-ddl: true

  networks:
    pgsg-network:
      external: true